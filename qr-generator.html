<!--
    Application: QR Generator
    Version: 1.0.0
    Created: 2026-06-07
    Model: Gemini 3 Flash Preview
    Description: Real-time QR code generator with download capability and developer utilities.
    Specification: specs/qr-generator-spec.md
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator | Scalopus</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #1a1a1a;
            --accent-color: #0070f3;
            --input-bg: #f5f5f7;
            --dev-bg: #1a1a1a;
            --dev-text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        main {
            width: 90%;
            max-width: 600px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .input-container {
            width: 100%;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid transparent;
            border-radius: 12px;
            background-color: var(--input-bg);
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background-color: #ffffff;
        }

        #qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        canvas {
            max-width: 100%;
            height: auto !important;
        }

        .download-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            opacity: 0.9;
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        /* Nav & Dev Icons */
        .bottom-icon {
            position: fixed;
            bottom: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.2s;
            z-index: 100;
            background: none;
            border: none;
            padding: 5px;
            color: var(--text-color);
            text-decoration: none;
        }

        .bottom-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        #home-link { left: 20px; }
        #dev-btn { right: 20px; }

        /* Dev Menu */
        #dev-menu {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: var(--dev-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 101;
        }

        #dev-menu.active { display: flex; }

        .dev-item {
            font-size: 0.85rem;
            color: #ccc;
            text-decoration: none;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .dev-item:hover {
            background: #333;
            color: white;
        }

        .dev-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <main>
        <h1>QR Generator</h1>
        <div class="input-container">
            <input type="text" id="qr-input" placeholder="Paste URL or type text here..." autofocus autocomplete="off">
        </div>

        <div id="qr-container">
            <canvas id="qr-canvas"></canvas>
            <button id="download-btn" class="download-btn">
                <span>📥</span> Download PNG
            </button>
        </div>
    </main>

    <!-- Navigation Icons -->
    <a href="index.html" id="home-link" class="bottom-icon" title="Back to Home">🏠</a>
    <button id="dev-btn" class="bottom-icon" onclick="toggleDevMenu()" title="Developer Menu">🛠️</button>

    <!-- Developer Menu -->
    <div id="dev-menu">
        <div class="dev-label">Developer Options</div>
        <a href="https://github.com/scalopus/scalopus.github.io/blob/main/src/qr-generator.html" target="_blank" class="dev-item">
            <span>📂</span> View Source Code
        </a>
        <button class="dev-item" onclick="copyAIPrompt()">
            <span>🤖</span> AI Prompt
        </button>
        <div class="dev-label">Tool Information</div>
        <div style="font-size: 0.8rem; color: #888; padding: 0 8px;">Version: 1.0.0</div>
        <div style="font-size: 0.8rem; color: #888; padding: 0 8px;">Created: 2026-06-07</div>
        <div style="font-size: 0.8rem; color: #888; padding: 0 8px;">Model: Gemini 3 Flash Preview</div>
        <div style="font-size: 0.8rem; color: #888; padding: 0 8px;">Library: qrious (4.0.2)</div>
    </div>

    <script>
        const qrInput = document.getElementById('qr-input');
        const qrCanvas = document.getElementById('qr-canvas');
        const downloadBtn = document.getElementById('download-btn');

        // Initialize QR Code
        const qr = new QRious({
            element: qrCanvas,
            size: 300,
            value: 'https://scalopus.github.io/',
            level: 'H'
        });

        // Real-time update
        qrInput.addEventListener('input', () => {
            const value = qrInput.value.trim();
            if (value) {
                qr.value = value;
                qrCanvas.style.opacity = "1";
                downloadBtn.style.display = "flex";
            } else {
                // If empty, maybe show a placeholder or clear
                qr.value = " "; // Space as a placeholder
                qrCanvas.style.opacity = "0.3";
                downloadBtn.style.display = "none";
            }
        });

        // Download PNG
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'qrcode.png';
            link.href = qrCanvas.toDataURL('image/png');
            link.click();
        });

        // Developer Menu Logic
        function toggleDevMenu() {
            const menu = document.getElementById('dev-menu');
            menu.classList.toggle('active');
        }

        function copyAIPrompt() {
            const prompt = `# Specification: QR Generator

## Metadata
- **Tool Name**: QR Generator
- **Version**: 1.0.0
- **Status**: Active

## Description
A fast, real-time QR code generator that updates the QR code image as the user types in a URL or text string.

## Features
- **Instant Feedback**: No "Generate" button required; the QR code evolves with every keystroke.
- **Auto-Focus**: Input field is focused on page load for immediate use.
- **Download PNG**: A dedicated button to download the current QR code as a PNG file.
- **Developer Menu**: Standard Scalopus developer utilities included.

## Technical Stack
- **HTML5/CSS3**: Layout and styling.
- **JavaScript (Vanilla)**: Interaction logic.
- **QR Library**: \`qrious\` (CDN: \`https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js\`)

## Future AI Prompt
"Create a single-file HTML QR code generator using the qrious library. The UI should feature a centered text input and a canvas for the QR code. The QR code must update on every 'input' event of the textbox. Include a download as PNG button, a home link at bottom-left and a developer menu at bottom-right."`;
            navigator.clipboard.writeText(prompt).then(() => {
                alert('Specification copied to clipboard!');
                toggleDevMenu();
            });
        }

        // Close menu when clicking outside
        window.addEventListener('click', (e) => {
            const menu = document.getElementById('dev-menu');
            const devBtn = document.getElementById('dev-btn');
            if (menu.classList.contains('active') && !menu.contains(e.target) && e.target !== devBtn) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
