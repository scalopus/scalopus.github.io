<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer | Scalopus</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --accent-color: #0070f3;
            --control-bg: rgba(255, 255, 255, 0.1);
            --danger-color: #ff4d4d;
            --dev-bg: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #timer-display {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 25vw;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            user-select: none;
            transition: color 0.3s ease;
        }

        #timer-display.last-seconds {
            color: var(--danger-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #controls {
            padding: 20px;
            background: var(--control-bg);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            z-index: 10;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 5px;
            background: #222;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .input-group input {
            background: transparent;
            border: none;
            color: white;
            width: 40px;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
        }

        .input-group input:focus {
            outline: none;
            color: var(--accent-color);
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }

        button:hover {
            background: #444;
        }

        button:active {
            background: var(--accent-color);
        }

        .quick-set-group {
            display: flex;
            gap: 8px;
        }

        .options-group {
            display: flex;
            gap: 12px;
            font-size: 0.85rem;
            align-items: center;
        }

        label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        #reset-btn {
            background: var(--danger-color);
        }

        #reset-btn:hover {
            background: #e60000;
        }

        /* Nav & Dev Icons */
        .bottom-icon {
            position: fixed;
            bottom: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s, transform 0.2s;
            z-index: 100;
            background: none;
            border: none;
            padding: 5px;
            color: white;
            text-decoration: none;
        }

        .bottom-icon:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        #home-link { left: 20px; }
        #dev-btn { right: 20px; }

        /* Dev Menu */
        #dev-menu {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: var(--dev-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: none;
            flex-direction: column;
            gap: 10px;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 101;
        }

        #dev-menu.active { display: flex; }

        .dev-item {
            font-size: 0.85rem;
            color: #ccc;
            text-decoration: none;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .dev-item:hover {
            background: #2a2a2a;
            color: white;
        }

        .dev-label {
            font-weight: 600;
            color: #666;
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .dev-info {
            font-size: 0.8rem;
            color: #888;
            padding: 0 8px;
        }
    </style>
</head>
<body>

    <div id="timer-display">00:00</div>

    <div id="controls">
        <div class="input-group">
            <input type="text" id="min-input" placeholder="00" maxlength="2">
            <span>:</span>
            <input type="text" id="sec-input" placeholder="00" maxlength="2">
            <button onclick="setCustomTime()" style="padding: 5px 10px; margin-left: 5px;">Set</button>
        </div>

        <div class="quick-set-group">
            <button onclick="addSeconds(30)">+30s</button>
            <button onclick="addMinutes(1)">+1m</button>
            <button onclick="addMinutes(2)">+2m</button>
            <button onclick="addMinutes(5)">+5m</button>
            <button onclick="addMinutes(10)">+10m</button>
        </div>
        
        <button id="reset-btn" onclick="resetTimer()">Reset</button>

        <div class="options-group">
            <label title="Flashing red display in last 10s">
                <input type="checkbox" id="last-10s-check" checked>
                Cue
            </label>
            <label title="3 beeps at the end">
                <input type="checkbox" id="sound-check" checked>
                Sound
            </label>
        </div>
    </div>

    <!-- Navigation Icons -->
    <a href="index.html" id="home-link" class="bottom-icon" title="Back to Home">🏠</a>
    <button id="dev-btn" class="bottom-icon" onclick="toggleDevMenu()" title="Developer Menu">🛠️</button>

    <!-- Developer Menu -->
    <div id="dev-menu">
        <div class="dev-label">Developer Options</div>
        <a href="https://github.com/scalopus/scalopus.github.io/blob/main/src/timer.html" target="_blank" class="dev-item">
            <span>📂</span> View Source Code
        </a>
        <button class="dev-item" onclick="copyAIMarkdown()">
            <span>🤖</span> AI Markdown (Replicate)
        </button>
        
        <div class="dev-label">Tool Information</div>
        <div class="dev-info">Version: 1.1.0</div>
        <div class="dev-info">Created: 2026-06-05</div>
        <div class="dev-info">Model: Gemini 3 Flash Preview</div>
    </div>

    <script>
        let timeLeft = 0;
        let timerInterval = null;
        const display = document.getElementById('timer-display');
        const minInput = document.getElementById('min-input');
        const secInput = document.getElementById('sec-input');
        const last10sCheck = document.getElementById('last-10s-check');
        const soundCheck = document.getElementById('sound-check');
        const devMenu = document.getElementById('dev-menu');

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(frequency = 880, duration = 0.2) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + duration);
        }

        function triggerEndSound() {
            // 3 beeps over 3 seconds (approx)
            playBeep(880, 0.5);
            setTimeout(() => playBeep(880, 0.5), 1000);
            setTimeout(() => playBeep(1100, 0.8), 2000);
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            display.textContent = formatTime(timeLeft);
            
            if (timeLeft <= 10 && timeLeft > 0 && last10sCheck.checked) {
                display.classList.add('last-seconds');
            } else {
                display.classList.remove('last-seconds');
            }
        }

        function setCustomTime() {
            const mins = parseInt(minInput.value) || 0;
            const secs = parseInt(secInput.value) || 0;
            timeLeft = (mins * 60) + secs;
            updateDisplay();
            startTimer();
        }

        function addSeconds(s) {
            timeLeft += s;
            updateDisplay();
            startTimer();
        }

        function addMinutes(m) {
            addSeconds(m * 60);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            timeLeft = 0;
            updateDisplay();
        }

        function startTimer() {
            if (timerInterval || timeLeft <= 0) return;
            
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                    
                    // Sound logic: beep on last 2, 1, 0 seconds if sound enabled
                    if (soundCheck.checked) {
                        if (timeLeft === 2 || timeLeft === 1) {
                            playBeep(880, 0.2);
                        } else if (timeLeft === 0) {
                            triggerEndSound();
                        }
                    }

                    if (timeLeft === 0) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                    }
                }
            }, 1000);
        }

        // Dev Menu Logic
        function toggleDevMenu() {
            devMenu.classList.toggle('active');
        }

        function copyAIMarkdown() {
            const htmlContent = document.documentElement.outerHTML;
            const markdown = "```html\n" + htmlContent + "\n```";
            
            navigator.clipboard.writeText(markdown).then(() => {
                alert("AI Replicate Markdown copied to clipboard!");
                toggleDevMenu();
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!devMenu.contains(e.target) && e.target.id !== 'dev-btn') {
                devMenu.classList.remove('active');
            }
        });

        updateDisplay();
    </script>
</body>
</html>
