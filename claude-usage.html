<!--
    Application: Claude API Usage
    Version: 1.0.0
    Created: 2026-06-09
    Model: Claude Sonnet 4.6
    Description: Visualize Claude API token usage from a CSV export — cost, token breakdown, cache hit rate, by key and model.
    Specification: specs/claude-usage-spec.md
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude API Usage | Scalopus</title>
<style>
:root{
    --bg:#0f1117;
    --surface:#1a1d27;
    --surface2:#21242f;
    --border:#2e3240;
    --text:#e2e4ec;
    --muted:#7a7f93;
    --opus:#c084fc;
    --sonnet:#60a5fa;
    --haiku:#34d399;
    --other:#94a3b8;
    --bar-bg:#2e3240;
    --bar-fill:#6c8cff;
    --gold:#ffe08a;
    --cost:#fb923c;
    --dev-bg:#1a1d27;
    --dev-text:#ffffff;
}
*,:before,:after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif;font-size:14px;line-height:1.5}
#drop-zone{flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:40px;display:flex}
.drop-card{background:var(--surface);border:2px dashed var(--border);cursor:pointer;text-align:center;border-radius:16px;width:100%;max-width:460px;padding:56px 40px 48px;transition:border-color .15s,background .15s}
.drop-card.drag-over,.drop-card:hover{background:var(--surface2);border-color:var(--bar-fill)}
.drop-icon{color:var(--muted);margin-bottom:18px}
.drop-title{margin-bottom:8px;font-size:18px;font-weight:600}
.drop-hint{color:var(--muted);font-size:13px}
.drop-hint strong{color:var(--bar-fill);cursor:pointer}
.drop-hint strong:hover{text-decoration:underline}
.drop-meta{color:var(--muted);opacity:.6;margin-top:20px;font-size:11px}
#file-input{display:none}
#drop-zone.minimized{border-bottom:1px solid var(--border);background:var(--surface);min-height:0;padding:0}
#drop-zone.minimized .drop-card{text-align:left;background:0 0;border:none;border-radius:0;flex-direction:row;align-items:center;gap:10px;max-width:none;padding:10px 20px;display:flex}
#drop-zone.minimized .drop-card:hover,#drop-zone.minimized .drop-card.drag-over{background:var(--surface2);border-color:#0000}
#drop-zone.minimized .drop-icon{flex-shrink:0;margin-bottom:0}
#drop-zone.minimized .drop-icon svg{width:16px;height:16px}
#drop-zone.minimized .drop-title{white-space:nowrap;text-overflow:ellipsis;max-width:320px;margin-bottom:0;font-size:12px;font-weight:600;overflow:hidden}
#drop-zone.minimized .drop-hint{font-size:11px}
#drop-zone.minimized .drop-meta{display:none}
#report{max-width:1500px;margin:0 auto;padding:28px 24px 80px}
.report-header{flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px;display:flex}
.report-header h1{margin-bottom:3px;font-size:21px;font-weight:600}
.report-header p{color:var(--muted);font-size:12px}
.btn-reset{background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:8px;flex-shrink:0;padding:7px 14px;font-size:12px;font-weight:600;transition:background .1s,color .1s}
.btn-reset:hover{background:var(--surface2);color:var(--text)}
.date-filter{background:var(--surface);border:1px solid var(--border);border-radius:12px;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:20px;padding:10px 14px;display:flex}
.filter-label{color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-right:2px;font-size:10px;font-weight:700}
.period-btns{gap:3px;display:flex}
.btn-period{color:var(--muted);cursor:pointer;background:0 0;border:1px solid #0000;border-radius:6px;padding:5px 11px;font-size:12px;font-weight:600;transition:background .1s,color .1s,border-color .1s}
.btn-period:hover{background:var(--surface2);color:var(--text)}
.btn-period.active{background:var(--surface2);color:var(--text);border-color:#4a5180}
.key-search{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;outline:none;width:200px;margin-left:auto;padding:5px 10px;font-size:12px}
.key-search::placeholder{color:var(--muted)}
.key-search:focus{border-color:#4a5180}
.date-nav{align-items:center;gap:8px;display:flex}
.btn-nav{background:var(--surface2);border:1px solid var(--border);color:var(--text);cursor:pointer;border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700;transition:background .1s}
.btn-nav:hover{background:#2a2e40}
#period-label{text-align:center;min-width:170px;font-size:13px;font-weight:600}
.summary-grid{grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;margin-bottom:22px;display:grid}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px}
.card .label{color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:5px;font-size:10px;font-weight:700}
.card .value{font-size:19px;font-weight:700}
.card.hl-cost{border-color:#fb923c4d}
.card.hl-cost .value{color:var(--cost)}
.card.hl-tok .value{color:var(--gold)}
.tabs{flex-wrap:wrap;gap:4px;margin-bottom:10px;display:flex}
.tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;border-radius:8px;align-items:center;gap:7px;padding:6px 13px;font-size:12px;font-weight:600;transition:background .12s,color .12s,border-color .12s;display:flex}
.tab:hover{background:var(--surface2);color:var(--text)}
.tab.active{background:var(--surface2);color:var(--text);border-color:#4a5180}
.tab-opus.active{border-color:var(--opus);color:var(--opus)}
.tab-sonnet.active{border-color:var(--sonnet);color:var(--sonnet)}
.tab-haiku.active{border-color:var(--haiku);color:var(--haiku)}
.tab-pill{opacity:.75;background:#ffffff0f;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:500}
.tab-panel{display:none}
.tab-panel.active{display:block}
.table-wrap{border:1px solid var(--border);border-radius:12px;overflow-x:auto}
table{background:var(--surface);border-collapse:collapse;width:100%}
thead th{background:var(--surface2);border-bottom:1px solid var(--border);color:var(--muted);letter-spacing:.05em;text-align:right;text-transform:uppercase;white-space:nowrap;padding:9px 12px;font-size:10px;font-weight:700}
thead th.left{text-align:left}
thead th.sortable{cursor:pointer;-webkit-user-select:none;user-select:none}
thead th.sortable:hover{color:var(--text);background:#262a38}
thead th.sort-active{color:var(--text)}
.sort-arrow{color:var(--bar-fill);margin-left:3px;font-style:normal}
.sort-hint{opacity:.25;margin-left:3px;font-style:normal}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
td{vertical-align:middle;padding:9px 12px}
td.rank{color:var(--muted);width:30px;font-size:11px;font-weight:600}
td.key-name{min-width:130px;max-width:210px}
.key-label{text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;font-weight:500;display:block;overflow:hidden}
.bar-wrap{background:var(--bar-bg);border-radius:2px;height:3px;overflow:hidden}
.bar{background:var(--bar-fill);border-radius:2px;min-width:1px;height:100%}
td.num{font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap;font-size:12px}
td.col-total{color:var(--gold);font-weight:600}
td.col-cost{color:var(--cost);font-weight:600}
td.col-hit{color:var(--haiku)}
td.col-models{min-width:160px;max-width:300px}
.badge{white-space:nowrap;border-radius:20px;margin:1px 2px 1px 0;padding:2px 7px;font-size:10px;font-weight:600;display:inline-block}
.badge-opus{color:var(--opus);background:#3b1f5e}
.badge-sonnet{color:var(--sonnet);background:#1a3050}
.badge-haiku{color:var(--haiku);background:#0f3028}
.badge-other{background:var(--border);color:var(--other)}
tfoot td{background:var(--surface2);border-top:2px solid var(--border);text-align:right;padding:10px 12px;font-size:12px;font-weight:700}
tfoot td.left{text-align:left}
tfoot td.col-total{color:var(--gold)}
tfoot td.col-cost{color:var(--cost)}
.key-count{color:var(--muted);font-size:11px;font-weight:400}
.empty-msg{color:var(--muted);text-align:center;padding:32px 20px}
.footer-note{color:var(--muted);text-align:center;margin-top:16px;font-size:11px}

/* Bottom navigation icons */
.bottom-icon {
    position: fixed;
    bottom: 20px;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.3s, transform 0.2s;
    z-index: 100;
    background: none;
    border: none;
    padding: 5px;
    color: var(--text);
    text-decoration: none;
}
.bottom-icon:hover { opacity: 1; transform: scale(1.1); }
#home-link { left: 20px; }
#dev-btn { right: 20px; }

/* Dev Menu */
#dev-menu {
    position: fixed;
    bottom: 60px;
    right: 20px;
    background: var(--dev-bg);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 15px;
    display: none;
    flex-direction: column;
    gap: 10px;
    width: 250px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    z-index: 101;
}
#dev-menu.active { display: flex; }
.dev-item {
    font-size: 0.85rem;
    color: #ccc;
    text-decoration: none;
    padding: 8px;
    border-radius: 4px;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
}
.dev-item:hover { background: #333; color: white; }
.dev-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    color: #666;
    letter-spacing: 1px;
    margin-bottom: 5px;
}
</style>
</head>
<body>

<div id="drop-zone">
  <div class="drop-card" id="drop-card">
    <div class="drop-icon">
      <svg width="52" height="52" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.4" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
    </div>
    <div class="drop-title">Drop your CSV here</div>
    <p class="drop-hint">
      Drag &amp; drop a Claude API token export, or <strong id="browse-btn">browse to select</strong>
    </p>
    <p class="drop-meta">Export from console.anthropic.com → Usage → Export CSV</p>
    <input type="file" id="file-input" accept=".csv">
  </div>
</div>

<div id="report" hidden>
  <div class="report-header">
    <div>
      <h1>Claude API Token Usage</h1>
      <p id="report-subtitle"></p>
    </div>
    <button class="btn-reset" id="btn-reset">↑ Load new CSV</button>
  </div>

  <div class="date-filter">
    <span class="filter-label">Period</span>
    <div class="period-btns">
      <button class="active btn-period" data-period="all">All</button>
      <button class="btn-period" data-period="month">Month</button>
      <button class="btn-period" data-period="week">Week</button>
      <button class="btn-period" data-period="day">Day</button>
    </div>
    <input id="keySearch" class="key-search" placeholder="Search API key…">
    <div class="date-nav" id="date-nav" style="display:none">
      <button class="btn-nav" id="btn-prev">◀</button>
      <span id="period-label"></span>
      <button class="btn-nav" id="btn-next">▶</button>
    </div>
  </div>

  <div class="summary-grid" id="summary-grid"></div>
  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
  <p class="footer-note" id="footer-note"></p>
</div>

<!-- Navigation Icons -->
<a href="index.html" id="home-link" class="bottom-icon" title="Back to Home">🏠</a>
<button id="dev-btn" class="bottom-icon" onclick="toggleDevMenu()" title="Developer Menu">🛠️</button>

<!-- Developer Menu -->
<div id="dev-menu">
    <div class="dev-label">Developer Options</div>
    <a href="https://github.com/scalopus/scalopus.github.io/blob/main/claude-usage.html" target="_blank" class="dev-item">
        <span>📂</span> View Source Code
    </a>
    <button class="dev-item" onclick="copyAIPrompt()">
        <span>🤖</span> AI Prompt
    </button>
    <div class="dev-label">Tool Information</div>
    <div style="font-size:0.8rem;color:#888;padding:0 8px">Version: 1.0.0</div>
    <div style="font-size:0.8rem;color:#888;padding:0 8px">Created: 2026-06-09</div>
    <div style="font-size:0.8rem;color:#888;padding:0 8px">Model: Claude Sonnet 4.6</div>
</div>

<script>

}function v(e){return e.input+e.cw5m+e.cw1h+e.cacheRead+e.output}function g([e,t],a){switch(a){case"key":return e.toLowerCase();case"_total":default:return t._total;case"cost":return t.cost;case"input":return t.input;case"cacheWrite":return t.cw5m+t.cw1h;case"cacheRead":return t.cacheRead;case"output":return t.output;case"cacheHit":return t.cacheRead+t.cw5m+t.cw1h>0?t.cacheRead/(t.cacheRead+t.cw5m+t.cw1h):0;case"searches":return t.searches;case"days":return t.days.size}}function _(e,t,a){let s=p.sortCol===e,n=["sortable",a?"left":"",s?"sort-active":""].filter(Boolean).join(" "),c=s?`<i class="sort-arrow">${"desc"===p.sortDir?"▼":"▲"}</i>`:'<i class="sort-hint">⇅</i>';return`<th class="${n}" onclick="setSortCol('${e}')">${t}${c}</th>`}function $(e,t){if(!e.length)return'<div class="table-wrap"><p class="empty-msg">No data for this period</p></div>';let{sortCol:a,sortDir:s}=p,d=[...e].sort((e,t)=>{let n=g(e,a),c=g(t,a);return"string"==typeof n?"asc"===s?n.localeCompare(c):c.localeCompare(n):"asc"===s?n-c:c-n}),i=e.reduce((e,[,t])=>Math.max(e,t._total),0)||1,u=d.map(([e,a],s)=>{let d=a.cw5m+a.cw1h,u=Math.round(a._total/i*100),p=l(a.cacheRead,a.cacheRead+d),h=t?`<td class="col-models">${Object.entries(a.models).sort((e,t)=>t[1]-e[1]).map(([e])=>`<span class="badge badge-${o(e)}">${r(e)}</span>`).join("")}</td>`:"";return`<tr>

function copyAIPrompt() {
    const prompt = `# Specification: Claude API Usage

## Metadata
- **Tool Name**: Claude API Usage
- **Version**: 1.0.0
- **Status**: Active

## Description
A single-file CSV visualizer for Claude API token usage exports from console.anthropic.com. Drop in a CSV and get an interactive breakdown of cost, token consumption, and cache efficiency — by API key and model.

## Features
- **Drag-and-drop CSV loading**: Drop or browse to load a Claude API usage export CSV.
- **Summary cards**: Est. cost, total tokens, input, cache writes/reads, cache hit rate, output, web searches, key count, model count.
- **Period filter**: All / Month / Week / Day with prev/next navigation.
- **API key search**: Live filter rows by key name.
- **Tabbed model breakdown**: All-models tab plus per-model tabs with token counts.
- **Sortable table**: Click any column header to sort; bars show relative token volume.
- **Cost estimation**: Prices per model tier with batch/fast/geo-us modifiers.
- **Developer Menu**: Standard Scalopus developer utilities.

## Technical Stack
- **HTML5/CSS3/JS (Vanilla)**: Single self-contained file, no external dependencies.
- **CSV parsing**: Hand-rolled parser handling quoted fields.

## Future AI Prompt
"Create a single-file HTML tool that accepts a drag-and-drop CSV export from the Anthropic console. Parse it client-side, show summary cards for cost/tokens/cache, and render a sortable table broken down by API key and model with period filtering. Include a home link at bottom-left and a developer menu at bottom-right."`;
    navigator.clipboard.writeText(prompt).then(() => {
        alert('Specification copied to clipboard!');
        toggleDevMenu();
    });
}
